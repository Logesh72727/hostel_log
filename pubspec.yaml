name: hostel_log
description: A smart hostel entry system using biometric authentication.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.4
  cloud_firestore: ^5.6.2
  firebase_storage: ^12.4.1
  image_picker: ^1.0.4
  intl: ^0.18.1
  provider: ^6.0.5
  url_launcher: ^6.2.1
  excel: ^4.0.6
  path_provider: ^2.1.5
  share_plus: ^12.0.1
  pdf: ^3.12.0
  printing: ^5.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/login_bg.png